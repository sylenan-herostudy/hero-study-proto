<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Вход в личный кабинет — HeRo Study</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="icon" type="image/svg+xml" href="../assets/favicon.svg">
<link rel="icon" type="image/png" sizes="48x48" href="../assets/favicon-48.png">
<link rel="apple-touch-icon" href="../assets/apple-touch-icon.png">
<link rel="stylesheet" href="hs.css">
<script src="hs.js" defer></script>
</head>
<body>
<div class="page">
<hs-topbar></hs-topbar>
<hs-header></hs-header>

<style>
/* account-login: уникальные стили страницы */
.loginsec{padding:72px 0 96px}
.logincard{max-width:440px;padding:38px 34px 32px;text-align:center}
.logincard .lmark{height:36px;margin:0 auto 22px;display:block}
.logincard h1{font-size:27px;font-weight:800;letter-spacing:-.02em;color:#fff;margin:0 0 6px}
.logincard .lsub{color:#8893B5;font-size:14.5px;margin-bottom:26px}
.lrow{display:flex;align-items:center;justify-content:space-between;margin:2px 0 18px}
.checkline{display:inline-flex;align-items:center;gap:8px;color:#8893B5;font-size:13.5px;font-weight:600;cursor:pointer}
.checkline input{width:16px;height:16px;accent-color:#818CF8;cursor:pointer;margin:0}
.lrow .arrowlink{font-size:13.5px}
.ldivider{display:flex;align-items:center;gap:14px;margin:22px 0;color:#566089;font-size:12.5px;font-weight:700;text-transform:uppercase;letter-spacing:.08em}
.ldivider::before,.ldivider::after{content:"";flex:1;height:1px;background:rgba(255,255,255,.1)}
.ssostack{display:flex;flex-direction:column;gap:10px}
.lfoot{margin-top:24px;color:#8893B5;font-size:14px}
.lfoot a{color:#A5B4FC;font-weight:700}
.lfoot a:hover{color:#fff}
.lhint{margin-top:18px;color:#566089;font-size:12.5px;line-height:1.55}
</style>

<!-- LOGIN -->
<section class="section loginsec"><div class="wrap">
  <div class="formcard logincard">
    <img class="lmark" src="../assets/logo-herostudy-white.svg" alt="HeRo Study">
    <h1>Вход в HeRo Study</h1>
    <p class="lsub">Личный кабинет для клиентов платформы.</p>
    <form action="account-dashboard.html" method="get">
      <div class="field"><label for="lg-email">Email</label><input class="input" id="lg-email" type="email" placeholder="name@university.kz" autocomplete="email"></div>
      <div class="field"><label for="lg-pass">Пароль</label><input class="input" id="lg-pass" type="password" placeholder="••••••••" autocomplete="current-password"></div>
      <div class="lrow">
        <label class="checkline"><input type="checkbox" checked> Запомнить меня</label>
        <a class="arrowlink" href="#">Забыли пароль?</a>
      </div>
      <button class="btn btn-primary btn-block" type="submit">Войти</button>
    </form>
    <div class="ldivider">или</div>
    <div class="ssostack">
      <a class="btn btn-glass btn-block" href="account-dashboard.html"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3.5" y="3.5" width="7" height="7" rx="1.8"/><rect x="13.5" y="3.5" width="7" height="7" rx="1.8"/><rect x="3.5" y="13.5" width="7" height="7" rx="1.8"/><rect x="13.5" y="13.5" width="7" height="7" rx="1.8"/></svg>Войти через Google</a>
      <a class="btn btn-glass btn-block" href="account-dashboard.html"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3.5" y="3.5" width="17" height="17" rx="2.5"/><path d="M12 3.5v17"/><path d="M3.5 12h17"/></svg>Войти через Microsoft</a>
    </div>
    <p class="lfoot">Нет аккаунта? <a href="consultation.html">Запросить доступ →</a></p>
    <p class="lhint">Доступ в кабинет выдаёт команда HeRo Study при подключении вуза. Поддерживаются единый вход (SSO) и двухфакторная аутентификация.</p>
  </div>
</div></section>

<hs-footer></hs-footer>

</div>
</body>
</html>
